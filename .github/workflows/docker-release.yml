name: docker-release

on:
  release:
    types: [ created ]
  pull_request: # XXX: temporary
    branches:
      - main

jobs:
  rotel:
    name: docker-rotel-release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set build env
        run: echo "BUILD_SHORT_SHA=$(echo -n $GITHUB_SHA | cut -c 1-7)" >> $GITHUB_ENV

      # configure build / push targets
      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            streamfold/rotel
          tags: |
            type=ref,event=branch
            type=ref,event=tag
            type=sha

      - name: Login to DockerHub
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          build-args: |
            RUST_VERSION=1.89
            BUILD_SHORT_SHA=${{ env.BUILD_SHORT_SHA }}
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  clickhouse-ddl:
    name: docker-clickhouse-ddl-release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set build env
        run: echo "BUILD_SHORT_SHA=$(echo -n $GITHUB_SHA | cut -c 1-7)" >> $GITHUB_ENV

      # configure build / push targets
      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            streamfold/rotel-clickhouse-ddl
          tags: |
            type=ref,event=branch
            type=ref,event=tag
            type=sha

      - name: Login to DockerHub
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.clickhouse-ddl
          platforms: linux/amd64,linux/arm64
          build-args: |
            RUST_VERSION=1.89
            BUILD_SHORT_SHA=${{ env.BUILD_SHORT_SHA }}
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
